<svg width="128" height="128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle - modern blue gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  
  <circle cx="64" cy="64" r="60" fill="url(#bgGradient)"/>
  
  <!-- Central hub representing automation -->
  <circle cx="64" cy="64" r="24" fill="white" stroke="#E5E7EB" stroke-width="2"/>
  
  <!-- Gear/automation symbol inside hub -->
  <g transform="translate(64, 64) rotate(0)">
    <circle cx="0" cy="0" r="6" fill="#3B82F6" opacity="0.8"/>
    <rect x="-2" y="-10" width="4" height="8" rx="1" fill="#3B82F6" opacity="0.8"/>
    <rect x="-2" y="2" width="4" height="8" rx="1" fill="#3B82F6" opacity="0.8"/>
    <rect x="-10" y="-2" width="8" height="4" rx="1" fill="#3B82F6" opacity="0.8"/>
    <rect x="2" y="-2" width="8" height="4" rx="1" fill="#3B82F6" opacity="0.8"/>
  </g>
  
  <!-- Platform 1: Web/Cloud (top) -->
  <g transform="translate(64, 24)">
    <circle cx="0" cy="0" r="12" fill="#EF4444" opacity="0.9"/>
    <path d="M-4 0 L0 -4 L4 0 L0 4 Z" fill="white" transform="scale(0.7)"/>
  </g>
  
  <!-- Platform 2: Mobile (right) -->
  <g transform="translate(104, 64)">
    <circle cx="0" cy="0" r="12" fill="#F59E0B" opacity="0.9"/>
    <rect x="-3.5" y="-5" width="7" height="10" rx="1" fill="white"/>
    <circle cx="0" cy="-3" r="0.8" fill="#F59E0B"/>
  </g>
  
  <!-- Platform 3: Desktop (bottom) -->
  <g transform="translate(64, 104)">
    <circle cx="0" cy="0" r="12" fill="#8B5CF6" opacity="0.9"/>
    <rect x="-6" y="-4" width="12" height="8" rx="1" fill="white"/>
    <rect x="-4" y="1" width="8" height="2" rx="0.5" fill="#8B5CF6" opacity="0.7"/>
  </g>
  
  <!-- Platform 4: Social Media (left) -->
  <g transform="translate(24, 64)">
    <circle cx="0" cy="0" r="12" fill="#10B981" opacity="0.9"/>
    <path d="M-4 -4 L4 -4 L4 4 L-4 4 Z" fill="white" transform="rotate(45)" stroke="#10B981" stroke-width="0.5"/>
  </g>
  
  <!-- Connection arrows from hub to platforms -->
  <g stroke="url(#arrowGradient)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.8">
    <!-- Top arrow -->
    <path d="M64 40 L64 24" marker-end="url(#arrowhead)"/>
    <!-- Right arrow -->
    <path d="M88 64 L104 64" marker-end="url(#arrowhead)"/>
    <!-- Bottom arrow -->
    <path d="M64 88 L64 104" marker-end="url(#arrowhead)"/>
    <!-- Left arrow -->
    <path d="M40 64 L24 64" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="url(#arrowGradient)"/>
    </marker>
  </defs>
  
  <!-- Automation flow arrows (circular) -->
  <path d="M 64 40 A 40 40 0 1 1 64 40" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.6" transform="rotate(-90 64 64)"/>
  
  <!-- Small sync arrows on circular path -->
  <g transform="translate(64, 64)">
    <g transform="rotate(0)">
      <path d="M 0 -36 L 4 -32 L 0 -28 L -4 -32 Z" fill="#6B7280" opacity="0.7"/>
    </g>
    <g transform="rotate(90)">
      <path d="M 0 -36 L 4 -32 L 0 -28 L -4 -32 Z" fill="#6B7280" opacity="0.7"/>
    </g>
    <g transform="rotate(180)">
      <path d="M 0 -36 L 4 -32 L 0 -28 L -4 -32 Z" fill="#6B7280" opacity="0.7"/>
    </g>
    <g transform="rotate(270)">
      <path d="M 0 -36 L 4 -32 L 0 -28 L -4 -32 Z" fill="#6B7280" opacity="0.7"/>
    </g>
  </g>
</svg>